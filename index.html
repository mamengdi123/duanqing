<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="public, max-age=31536000">
    <title>伤悲导航官网</title>
    <link rel="preload" href="abcd.jpg" as="image" type="image/jpeg">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --light: #ecf0f1;
            --gray: #95a5a6;
            --light-gray: #f8f9fa;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.08);
            --border: rgba(0, 0, 0, 0.1);
            --btn-color: linear-gradient(135deg, #3498db, #2980b9); /* 统一按钮颜色 */
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        html, body {
            min-height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 呼吸动画 */
        @keyframes breathe {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1),
                            0 0 0 rgba(52, 152, 219, 0.3);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15),
                            0 0 20px rgba(52, 152, 219, 0.5);
            }
        }
        
        /* 【修改点】新的时间数字动画：淡入+缩放 */
        @keyframes pulseFade {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.3;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .pulse-fade-animation {
            animation: pulseFade 0.5s cubic-bezier(0.4, 0.2, 1);
            display: inline-block;
        }
        /* 加载动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: #f8f9fa;
            color: var(--primary);
            line-height: 1.6;
            overflow-y: auto;
        }
        .container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease-out;
        }
        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3498db, #2980b9);
        }
        /* 公告区域 */
        .announcement {
            background-color: #f8f9fa;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            animation: slideUp 0.6s ease-out 0.1s both;
        }
        .announcement-icon {
            margin-right: 12px;
            color: var(--accent);
            font-size: 1.2em;
        }
        .announcement-text {
            font-size: 1em;
            font-weight: 600;
            color: var(--primary);
        }
        /* 头像区域 - 已添加呼吸动画 */
        .avatar-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--white);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            animation: breathe 3s ease-in-out infinite;
        }
        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            animation-play-state: paused;
        }
        /* 时间显示样式 */
        .time-container {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            animation: slideUp 0.6s ease-out 0.2s both;
        }
        .time-label {
            font-size: 0.9em;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .time-label i {
            color: var(--accent);
        }
        /* 【修改点】增大了时间显示的字体大小 */
        .time-display {
            font-size: 2.6em; /* 从 2.2em 增大到 2.6em */
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            font-variant-numeric: tabular-nums; /* 确保数字等宽 */
        }
        .time-digit {
            display: inline-block;
            min-width: 0.6em; /* 为数字提供基本宽度 */
            text-align: center;
            background: linear-gradient(to bottom, #2c3e50, #34495e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .time-separator {
            margin: 0 2px;
            opacity: 0.8;
            color: #3498db;
        }
        .date-display {
            font-size: 0.9em;
            color: var(--gray);
            margin-top: 5px;
            letter-spacing: 1px;
        }
        /* 按钮区域 - 统一样式并添加边框效果 */
        .main-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }
        .btn {
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 0.95em;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            color: var(--white);
            background: var(--btn-color);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.2);
            /* 新增边框效果 */
            border: 2px solid transparent;
            background-clip: padding-box;
            position: relative;
            z-index: 1;
        }
        /* 边框渐变效果 */
        .btn::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #3498db, #2980b9, #1c5a7a);
            border-radius: 14px; /* 比按钮圆角大2px */
            z-index: -1;
            opacity: 0.8;
            transition: all 0.3s ease;
        }
        .btn:hover::before {
            opacity: 1;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.6);
        }
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
        }
        .btn:hover::after {
            opacity: 1;
        }
        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        .icon {
            font-size: 1.1em;
        }
        /* 永久地址样式 */
        .permanent-url {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            font-size: 0.9em;
            color: var(--gray);
        }
        .clean-link {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            position: relative;
            transition: color 0.2s ease;
        }
        .clean-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background-color: var(--accent);
            transition: width 0.2s ease;
        }
        .clean-link:hover {
            color: #2980b9;
        }
        .clean-link:hover::after {
            width: 100%;
        }
        .copyright {
            margin-top: 12px;
            font-size: 0.85em;
            color: var(--gray);
        }
        .copyright span {
            color: var(--primary);
            font-weight: 600;
        }
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--white);
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #3498db, #2980b9, #1c5a7a);
        }
        .modal-header {
            margin-bottom: 20px;
        }
        .modal-icon {
            font-size: 2.5em;
            color: #3498db;
            margin-bottom: 10px;
        }
        .modal-title {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }
        .modal-subtitle {
            font-size: 0.9em;
            color: var(--gray);
        }
        .modal-body {
            margin-bottom: 25px;
            text-align: left;
        }
        .modal-message {
            background-color: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid var(--accent);
        }
        .modal-message p {
            margin-bottom: 12px;
            line-height: 1.6;
        }
        .modal-message p:last-child {
            margin-bottom: 0;
        }
        .modal-message strong {
            color: #3498db;
        }
        .modal-actions {
            display: flex;
            justify-content: center;
        }
        .modal-btn {
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            color: var(--white);
            background: linear-gradient(135deg, #3498db, #2980b9);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
            min-width: 150px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
        }
        .modal-btn:active {
            transform: translateY(0);
        }
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid var(--white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            display: inline;
        }
        .loading .loading-text {
            display: none;
        }
        .loading .loading-spinner {
            display: block;
        }
        /* 响应式设计 */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .card {
                padding: 25px;
                border-radius: 14px;
            }
            
            .announcement {
                padding: 14px 18px;
                margin-bottom: 25px;
            }
            
            .avatar {
                width: 90px;
                height: 90px;
            }
            
            .time-container {
                padding: 12px;
                margin-bottom: 20px;
            }
            
            .time-display {
                font-size: 2.2em; /* 相应调整移动端大小 */
            }
            
            .date-display {
                font-size: 0.85em;
            }
            
            .btn {
                padding: 14px 18px;
                font-size: 0.9em;
                border-radius: 10px;
            }
            
            .btn::before {
                border-radius: 12px;
            }
            
            .modal-content {
                padding: 25px 20px;
                width: 95%;
            }
        }
        @media (max-width: 360px) {
            .time-display {
                font-size: 2em; /* 相应调整小屏幕大小 */
            }
            
            .time-label {
                font-size: 0.85em;
            }
            
            .btn {
                padding: 12px 15px;
                font-size: 0.85em;
            }
        }
        @media (max-height: 700px) {
            .avatar {
                width: 80px;
                height: 80px;
            }
            
            .btn {
                padding: 12px 16px;
            }
            
            .announcement {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- 主页面内容 -->
    <div class="container">

    <script>
        // 自动更新年份
        document.getElementById('current-year').textContent = new Date().getFullYear();
        
        // 为按钮添加动画效果
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach((btn, index) => {
                btn.style.animation = 'slideUp 0.5s ease-out ' + (0.2 + index * 0.1) + 's both';
            });
        });
        
        // 弹窗相关功能 - 修改为每次访问都显示
        document.addEventListener('DOMContentLoaded', function() {
            const modalOverlay = document.getElementById('modalOverlay');
            const confirmBtn = document.getElementById('confirmBtn');
            
            // 每次访问都显示弹窗
            modalOverlay.style.display = 'flex';
            
            // 确认按钮点击事件
            confirmBtn.addEventListener('click', function() {
                // 添加加载状态
                confirmBtn.classList.add('loading');
                
                // 缩短加载时间为1秒
                setTimeout(function() {
                    // 移除加载状态
                    confirmBtn.classList.remove('loading');
                    
                    // 关闭弹窗
                    modalOverlay.style.display = 'none';
                }, 1000);
            });
            
            // 点击遮罩层不关闭弹窗，只允许通过确认按钮关闭
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    // 点击遮罩层时不关闭弹窗
                    confirmBtn.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        confirmBtn.style.transform = '';
                    }, 200);
                }
            });
        });
        
        // --- 优化后的时间更新逻辑，支持独立数字动画 ---
        let previousTimeString = ''; // 用于保存上一次的时间字符串，用于对比
        
        // 创建一个带动画的数字元素
        function createDigitElement(digit, isSeparator = false) {
            const span = document.createElement('span');
            span.className = isSeparator ? 'time-separator' : 'time-digit';
            span.textContent = digit;
            span.dataset.value = digit; // 存储当前显示的值
            return span;
        }
        
        // 更新时间函数（带动画）
        function updateBeijingTimeWithAnimation() {
            const now = new Date();
            const beijingTime = new Date(now.getTime() + (8 * 60 * 60 * 1000)); // UTC+8
            
            // 格式化时间和日期
            const hours = beijingTime.getUTCHours().toString().padStart(2, '0');
            const minutes = beijingTime.getUTCMinutes().toString().padStart(2, '0');
            const seconds = beijingTime.getUTCSeconds().toString().padStart(2, '0');
            
            const year = beijingTime.getUTCFullYear();
            const month = (beijingTime.getUTCMonth() + 1).toString().padStart(2, '0');
            const day = beijingTime.getUTCDate().toString().padStart(2, '0');
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekDay = weekDays[beijingTime.getUTCDay()];
            
            // 更新时间字符串，格式为 "HH:MM:SS"
            const currentTimeString = `${hours}:${minutes}:${seconds}`;
            
            // 获取时间显示容器
            const timeDisplay = document.getElementById('beijingTime');
            
            // 如果是第一次运行，或者时间字符串发生了变化
            if (previousTimeString !== currentTimeString) {
                // 第一次运行或结构需要重建
                if (!previousTimeString || timeDisplay.children.length === 0) {
                    timeDisplay.innerHTML = ''; // 清空现有内容
                    
                    // 构建带独立数字位的时间显示
                    const timeStr = hours + ':' + minutes + ':' + seconds;
                    for (let i = 0; i < timeStr.length; i++) {
                        const char = timeStr[i];
                        const isSeparator = char === ':';
                        const digitElement = createDigitElement(char, isSeparator);
                        timeDisplay.appendChild(digitElement);
                    }
                } else {
                    // 非首次，比较每一位数字
                    const digitSpans = timeDisplay.querySelectorAll('.time-digit');
                    let spanIndex = 0;
                    
                    // 遍历新时间字符串的每个字符
                    for (let i = 0; i < currentTimeString.length; i++) {
                        const newChar = currentTimeString[i];
                        const oldChar = previousTimeString[i];
                        
                        // 如果是数字位（非冒号）
                        if (newChar !== ':') {
                            if (spanIndex < digitSpans.length && newChar !== oldChar) {
                                // 数字发生变化，添加新的动画
                                const span = digitSpans[spanIndex];
                                // 【修改点】应用新的动画类
                                span.classList.add('pulse-fade-animation');
                                
                                // 动画结束后更新数字并移除动画类
                                span.addEventListener('animationend', function handler() {
                                    span.textContent = newChar;
                                    span.dataset.value = newChar;
                                    span.classList.remove('pulse-fade-animation');
                                    span.removeEventListener('animationend', handler);
                                }, { once: true }); // 确保事件只触发一次
                            }
                            spanIndex++;
                        }
                    }
                }
                
                // 保存当前时间字符串供下次比较
                previousTimeString = currentTimeString;
            }
            
            // 更新日期（日期变化不频繁，不需要复杂动画）
            document.getElementById('beijingDate').textContent = `${year}年${month}月${day}日 星期${weekDay}`;
        }
        
        // 初始化时间更新
        document.addEventListener('DOMContentLoaded', function() {
            // 立即更新时间（首次渲染）
            updateBeijingTimeWithAnimation();
            
            // 每秒更新时间（并检查是否需要触发动画）
            setInterval(updateBeijingTimeWithAnimation, 1000);
        });
    </script>
</body>
</html>
